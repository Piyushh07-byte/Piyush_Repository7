<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Login - Student Doubt Assistant</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
  }
  .card {
    background: #fff;
    padding: 40px 35px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 360px;
  }
  .card h1 {
    font-size: 22px;
    margin: 0 0 6px;
    color: #1f2937;
  }
  .card p {
    color: #6b7280;
    font-size: 14px;
    margin: 0 0 25px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 14px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 14px;
  }
  input:focus { outline: 2px solid #7c3aed; border-color: transparent; }
  button {
    width: 100%;
    padding: 12px;
    background: #7c3aed;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
  }
  button:hover { background: #6d28d9; }
  .error {
    color: #dc2626;
    font-size: 13px;
    margin-bottom: 10px;
    display: none;
  }
</style>
</head>
<body>

  <div class="card">
    <h1>👋 Welcome back</h1>
    <p>Login to ask your JEE / NEET / GUJCET doubts</p>

    <div class="error" id="errorMsg">Please fill in both fields</div>

    <form id="loginForm">
      <input type="text" id="username" placeholder="Your Name" required />
      <input type="email" id="email" placeholder="Email Address" required />
      <button type="submit">Login</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const name = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const errorMsg = document.getElementById('errorMsg');

      if (!name || !email) {
        errorMsg.style.display = 'block';
        return;
      }

      // Save dummy user session
      const user = {
        name: name,
        email: email,
        paid: false
      };
      localStorage.setItem('user', JSON.stringify(user));

      // Go to payment page next
      window.location.href = 'paymentfinal.html';
    });
  </script>

</body>
</html>
