<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VidyaBot — GUJCET · JEE · NEET Tutor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f5f5f4;
    --bg3: #eeede9;
    --text: #1a1a18;
    --text2: #6b6a65;
    --text3: #a3a29e;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-dark: #0C447C;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg2: #252522;
      --bg3: #2e2e2b;
      --text: #f0efe9;
      --text2: #9e9d97;
      --text3: #6b6a65;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --blue: #4a9ede;
      --blue-light: #0d2d4a;
      --blue-dark: #85b7eb;
    }
  }

  html, body {
    height: 100%;
    font-family: var(--font);
    background: var(--bg3);
    color: var(--text);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  .app-wrapper {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    height: calc(100vh - 32px);
    max-height: 780px;
    background: var(--bg);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 38px; height: 38px;
    background: var(--blue);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon i { color: #fff; font-size: 21px; }
  .logo-text { font-size: 17px; font-weight: 600; color: var(--text); }
  .logo-sub { font-size: 11px; color: var(--text3); margin-top: 1px; letter-spacing: 0.03em; }

  .lang-tabs {
    display: flex; gap: 3px;
    background: var(--bg2);
    border-radius: 8px;
    padding: 3px;
  }
  .lang-btn {
    font-size: 13px; font-weight: 500;
    padding: 5px 12px;
    border: none; border-radius: 6px;
    cursor: pointer;
    background: transparent;
    color: var(--text2);
    transition: all 0.15s;
    font-family: var(--font);
  }
  .lang-btn.active {
    background: var(--bg);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  /* SUBJECT BAR */
  .subject-bar {
    display: flex; gap: 6px;
    padding: 10px 18px;
    border-bottom: 0.5px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  .subject-bar::-webkit-scrollbar { display: none; }
  .subj-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: var(--bg);
    color: var(--text2);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: var(--font);
  }
  .subj-btn i { font-size: 15px; }
  .subj-btn.active {
    color: var(--blue);
    border-color: var(--blue);
    background: var(--blue-light);
  }

  /* CHAT */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .chat-area::-webkit-scrollbar { width: 4px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* QUICK START */
  .quick-start {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex: 1; gap: 18px;
    padding: 32px 20px;
    text-align: center;
  }
  .qs-icon {
    width: 56px; height: 56px;
    background: var(--blue); border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .qs-icon i { color: #fff; font-size: 30px; }
  .qs-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .qs-sub { font-size: 13px; color: var(--text2); }
  .qs-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-top: 4px;
  }
  .qs-chip {
    padding: 8px 14px; border-radius: 20px;
    border: 0.5px solid var(--border);
    background: var(--bg2);
    font-size: 13px; color: var(--text);
    cursor: pointer; transition: all 0.15s;
    font-family: var(--font);
    line-height: 1.4;
  }
  .qs-chip:hover {
    border-color: var(--blue);
    color: var(--blue);
    background: var(--blue-light);
  }

  /* MESSAGES */
  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 100%; }
  .msg.user { align-items: flex-end; }
  .msg.bot { align-items: flex-start; }

  .bubble {
    padding: 10px 15px;
    border-radius: 14px;
    font-size: 14px; line-height: 1.65;
    max-width: 88%;
  }
  .msg.user .bubble {
    background: var(--blue);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: var(--bg2);
    color: var(--text);
    border-bottom-left-radius: 4px;
    border: 0.5px solid var(--border);
  }

  .bot-header {
    display: flex; align-items: center; gap: 7px;
    margin-bottom: 7px;
  }
  .bot-avatar {
    width: 26px; height: 26px;
    background: var(--blue); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .bot-avatar i { color: #fff; font-size: 14px; }
  .bot-name { font-size: 12px; color: var(--text2); font-weight: 600; }
  .subj-tag {
    font-size: 11px; padding: 2px 8px;
    border-radius: 10px;
    background: var(--blue-light);
    color: var(--blue);
    font-weight: 500;
  }

  .answer-block { font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; }
  .answer-block .step {
    background: var(--bg);
    border-left: 3px solid var(--blue);
    padding: 7px 12px; margin: 7px 0;
    border-radius: 0 6px 6px 0;
    font-size: 13px;
  }
  .answer-block .formula {
    background: var(--blue-light);
    color: var(--blue-dark);
    padding: 9px 14px; border-radius: 8px;
    margin: 8px 0;
    font-family: var(--mono); font-size: 13px;
    text-align: center;
  }
  .answer-block .practice {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 8px; padding: 9px 12px; margin: 7px 0;
    font-size: 13px;
  }
  .answer-block .practice strong { color: var(--blue); font-weight: 600; }

  /* TYPING */
  .typing-indicator {
    display: flex; align-items: center; gap: 5px;
    padding: 10px 14px;
    background: var(--bg2);
    border-radius: 14px; border-bottom-left-radius: 4px;
    border: 0.5px solid var(--border);
    width: fit-content;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text3);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* FEEDBACK */
  .feedback-row { display: flex; gap: 6px; margin-top: 4px; }
  .fb-btn {
    font-size: 11px; color: var(--text3);
    background: none; border: none; cursor: pointer;
    padding: 3px 8px; border-radius: 5px;
    display: flex; align-items: center; gap: 4px;
    font-family: var(--font);
    transition: all 0.15s;
  }
  .fb-btn:hover { color: var(--text2); background: var(--bg2); }

  /* ERROR */
  .error-bubble {
    background: #FCEBEB; border: 0.5px solid #F7C1C1;
    color: #791F1F; padding: 10px 14px;
    border-radius: 14px; font-size: 13px;
    display: flex; align-items: center; gap: 8px;
  }

  /* INPUT */
  .input-hint {
    font-size: 11px; color: var(--text3);
    text-align: center; padding: 4px 18px 0;
    flex-shrink: 0;
  }
  .input-area {
    border-top: 0.5px solid var(--border);
    padding: 12px 18px 16px;
    display: flex; gap: 10px; align-items: flex-end;
    flex-shrink: 0; background: var(--bg);
  }
  .input-wrap {
    flex: 1; display: flex; align-items: center;
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 22px; padding: 8px 14px; gap: 8px;
    transition: border-color 0.15s;
  }
  .input-wrap:focus-within { border-color: var(--blue); }
  #user-input {
    border: none; background: transparent;
    font-size: 14px; color: var(--text);
    flex: 1; outline: none; resize: none;
    font-family: var(--font);
    max-height: 100px; line-height: 1.5;
  }
  #user-input::placeholder { color: var(--text3); }

  .send-btn {
    width: 40px; height: 40px;
    border-radius: 50%; background: var(--blue);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .send-btn:hover { background: var(--blue-dark); transform: scale(1.04); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { background: var(--bg2); cursor: not-allowed; transform: none; }
  .send-btn:disabled i { color: var(--text3); }
  .send-btn i { color: #fff; font-size: 18px; }

  @media (max-width: 480px) {
    body { padding: 0; }
    .app-wrapper { height: 100vh; max-height: 100vh; border-radius: 0; border: none; }
  }
</style>
</head>
<body>

<div class="app-wrapper">
  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-school"></i></div>
      <div>
        <div class="logo-text">VidyaBot</div>
        <div class="logo-sub">GUJCET · JEE · NEET</div>
      </div>
    </div>
    <div class="lang-tabs">
      <button class="lang-btn" data-lang="gu" onclick="setLang('gu')">ગુ</button>
      <button class="lang-btn" data-lang="hi" onclick="setLang('hi')">हि</button>
      <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
    </div>
  </div>

  <!-- SUBJECTS -->
  <div class="subject-bar">
    <button class="subj-btn active" data-subj="physics" onclick="setSubject('physics')">
      <i class="ti ti-atom"></i> Physics
    </button>
    <button class="subj-btn" data-subj="chemistry" onclick="setSubject('chemistry')">
      <i class="ti ti-flask"></i> Chemistry
    </button>
    <button class="subj-btn" data-subj="maths" onclick="setSubject('maths')">
      <i class="ti ti-math-function"></i> Maths
    </button>
    <button class="subj-btn" data-subj="biology" onclick="setSubject('biology')">
      <i class="ti ti-dna"></i> Biology
    </button>
  </div>

  <!-- CHAT -->
  <div class="chat-area" id="chat-area">
    <div class="quick-start" id="quick-start">
      <div class="qs-icon"><i class="ti ti-school"></i></div>
      <div>
        <div class="qs-title">Ask your doubt in any language</div>
        <div class="qs-sub" style="margin-top:4px;">Gujarati · Hindi · English</div>
      </div>
      <div class="qs-chips" id="sample-chips"></div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-hint" id="input-hint">Ask in Gujarati, Hindi, or English</div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="user-input" rows="1" placeholder="Type your doubt here..."></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <i class="ti ti-send"></i>
    </button>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────
// Paste your Anthropic API key below (for hackathon demo only)
// For production, route through a backend so the key is not exposed.
const API_KEY = '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';
// ────────────────────────────────────────────────────────

let currentLang = 'en';
let currentSubject = 'physics';
let isLoading = false;
let messages = [];

const langConfig = {
  en: {
    placeholder: 'Type your doubt here...',
    hint: 'Ask in Gujarati, Hindi, or English',
    thinking: 'VidyaBot is thinking...',
    subjects: { physics: 'Physics', chemistry: 'Chemistry', maths: 'Maths', biology: 'Biology' },
    samples: {
      physics:   ["What is Newton's 2nd Law?", "Explain electric potential", "How does a transformer work?"],
      chemistry: ["What is Avogadro's number?", "Explain covalent bonds", "What is pH?"],
      maths:     ["Solve: x² - 5x + 6 = 0", "What is integration?", "Explain permutations"],
      biology:   ["Explain DNA replication", "What is osmosis?", "How does photosynthesis work?"]
    }
  },
  hi: {
    placeholder: 'अपना सवाल यहाँ लिखें...',
    hint: 'गुजराती, हिंदी या अंग्रेजी में पूछें',
    thinking: 'VidyaBot सोच रहा है...',
    subjects: { physics: 'भौतिकी', chemistry: 'रसायन', maths: 'गणित', biology: 'जीव विज्ञान' },
    samples: {
      physics:   ["न्यूटन का दूसरा नियम क्या है?", "विद्युत क्षेत्र समझाएं", "ऊर्जा संरक्षण का नियम"],
      chemistry: ["आवोगाद्रो संख्या क्या है?", "सहसंयोजक बंध समझाएं", "pH क्या होता है?"],
      maths:     ["द्विघात समीकरण हल करें", "समाकलन क्या है?", "क्रमचय और संचय"],
      biology:   ["DNA प्रतिकृति समझाएं", "परासरण क्या है?", "प्रकाश संश्लेषण"]
    }
  },
  gu: {
    placeholder: 'તમારો પ્રશ્ન અહીં લખો...',
    hint: 'ગુજરાતી, હિન્દી અથવા અંગ્રેજીમાં પૂછો',
    thinking: 'VidyaBot વિચારી રહ્યો છે...',
    subjects: { physics: 'ભૌતિકશાસ્ત્ર', chemistry: 'રસાયણ', maths: 'ગણિત', biology: 'જીવ વિજ્ઞાન' },
    samples: {
      physics:   ["ન્યૂટનનો બીજો નિયમ શું છે?", "વિદ્યુત ક્ષેત્ર સમજાવો", "ઊર્જા સંરક્ષણનો નિયમ"],
      chemistry: ["અવોગ્રાડોની સંખ્યા શું છે?", "સહ-સંયોજક બંધ સમજાવો", "pH શું છે?"],
      maths:     ["દ્વિઘાત સમીકરણ ઉકેલો", "સમાકલન શું છે?", "ક્રમ અને સંચય"],
      biology:   ["DNA પ્રતિકૃતિ સમજાવો", "અભિસરણ શું છે?", "પ્રકાશ સંશ્લેષણ"]
    }
  }
};

const subjectIcons = {
  physics: 'ti-atom', chemistry: 'ti-flask',
  maths: 'ti-math-function', biology: 'ti-dna'
};

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  const cfg = langConfig[lang];
  document.getElementById('user-input').placeholder = cfg.placeholder;
  document.getElementById('input-hint').textContent = cfg.hint;
  updateSubjectLabels();
  updateSampleChips();
}

function setSubject(subj) {
  currentSubject = subj;
  document.querySelectorAll('.subj-btn').forEach(b => b.classList.toggle('active', b.dataset.subj === subj));
  updateSampleChips();
}

function updateSubjectLabels() {
  const cfg = langConfig[currentLang];
  document.querySelectorAll('.subj-btn').forEach(b => {
    const s = b.dataset.subj;
    b.innerHTML = `<i class="ti ${subjectIcons[s]}"></i> ${cfg.subjects[s]}`;
  });
}

function updateSampleChips() {
  const chips = document.getElementById('sample-chips');
  if (!chips) return;
  const samples = langConfig[currentLang].samples[currentSubject];
  chips.innerHTML = samples.map(s =>
    `<button class="qs-chip" onclick="askSample(this.textContent)">${s}</button>`
  ).join('');
}

function askSample(text) {
  document.getElementById('user-input').value = text;
  sendMessage();
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatAnswer(text) {
  text = escHtml(text);
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/__(.*?)__/g, '<em>$1</em>');
  text = text.replace(/```([\s\S]*?)```/g, '<div class="formula">$1</div>');
  text = text.replace(/`([^`]+)`/g, '<code style="background:var(--bg2);padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:12px;">$1</code>');
  text = text.replace(/🔢([^\n]*)/g, '<div class="formula">$1</div>');
  text = text.replace(/📝([^\n]*)/g, '<div class="practice"><strong>📝 Practice:</strong>$1</div>');
  text = text.replace(/➤([^\n]*)/g, '<div class="step">➤$1</div>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function appendMessage(role, content, subject) {
  const qs = document.getElementById('quick-start');
  if (qs) qs.remove();

  const chat = document.getElementById('chat-area');
  const cfg = langConfig[currentLang];

  if (role === 'user') {
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="bubble">${escHtml(content)}</div>`;
    chat.appendChild(div);

  } else if (role === 'typing') {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typing-msg';
    div.innerHTML = `
      <div class="bot-header">
        <div class="bot-avatar"><i class="ti ti-school"></i></div>
        <span class="bot-name">VidyaBot</span>
        <span class="subj-tag">${cfg.subjects[subject]}</span>
      </div>
      <div class="typing-indicator">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>`;
    chat.appendChild(div);

  } else if (role === 'bot') {
    const typing = document.getElementById('typing-msg');
    if (typing) typing.remove();
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `
      <div class="bot-header">
        <div class="bot-avatar"><i class="ti ti-school"></i></div>
        <span class="bot-name">VidyaBot</span>
        <span class="subj-tag">${cfg.subjects[subject]}</span>
      </div>
      <div class="bubble"><div class="answer-block">${formatAnswer(content)}</div></div>
      <div class="feedback-row">
        <button class="fb-btn" onclick="this.innerHTML='<i class=\\'ti ti-thumb-up\\'></i> Helpful!'">
          <i class="ti ti-thumb-up"></i> Helpful
        </button>
        <button class="fb-btn" onclick="this.innerHTML='<i class=\\'ti ti-bookmark\\'></i> Saved!'">
          <i class="ti ti-bookmark"></i> Save
        </button>
      </div>`;
    chat.appendChild(div);

  } else if (role === 'error') {
    const typing = document.getElementById('typing-msg');
    if (typing) typing.remove();
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `<div class="error-bubble"><i class="ti ti-alert-circle"></i> ${escHtml(content)}</div>`;
    chat.appendChild(div);
  }

  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  const subject = currentSubject;
  const lang = currentLang;

  messages.push({ role: 'user', content: text });
  appendMessage('user', text);
  appendMessage('typing', '', subject);

  const langNames = { en: 'English', hi: 'Hindi', gu: 'Gujarati' };
  const subjNames = { physics: 'Physics', chemistry: 'Chemistry', maths: 'Mathematics', biology: 'Biology' };

  const systemPrompt = `You are VidyaBot, an expert tutor for Indian competitive exams: GUJCET, JEE (Main & Advanced), and NEET. You help Class 11 and 12 students from Gujarat and across India.

LANGUAGE RULE: The student has selected ${langNames[lang]}. You MUST respond ONLY in ${langNames[lang]}. If Gujarati, write the entire response in Gujarati script. If Hindi, use Devanagari. If English, use English.

SUBJECT: ${subjNames[subject]}

RESPONSE FORMAT — always follow this structure:
1. Clear concept explanation in 2-3 sentences
2. Key formula or principle: 🔢 [formula here]
3. Step-by-step solution using ➤ for each step (at least 3-4 steps)
4. Exactly 2 practice questions using 📝 prefix

STYLE RULES:
- Use **bold** for important terms
- Simple language suitable for a 16-17 year old student
- Use relatable Indian examples (cricket ball, auto-rickshaw, roti, etc.)
- Be warm and encouraging
- For Gujarati/Hindi: still write formulas and numbers in standard math notation
- Connect to GUJCET/JEE/NEET exam patterns where relevant`;

  try {
    const apiMessages = messages.slice(-12).map(m => ({ role: m.role, content: m.content }));

    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + API_KEY
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 1000,
        messages: [{ role: 'system', content: systemPrompt }, ...apiMessages]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || 'API error ' + response.status);
    }

    const data = await response.json();
    const reply = data.choices[0].message.content;
    messages.push({ role: 'assistant', content: reply });
    appendMessage('bot', reply, subject);

  } catch (err) {
    console.error(err);
    const errMsgs = {
      en: 'Something went wrong. Check your API key and try again.',
      hi: 'कुछ गलत हो गया। API key जाँचें और पुनः प्रयास करें।',
      gu: 'કંઈક ખોટું થયું. API key તપાસો અને ફરી પ્રયાસ કરો.'
    };
    appendMessage('error', errMsgs[lang]);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// Auto-grow textarea
const textarea = document.getElementById('user-input');
textarea.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
textarea.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Init
updateSubjectLabels();
updateSampleChips();
</script>
